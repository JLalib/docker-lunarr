version: '3.8'

services:
  lunarr:
    image: sayem314/lunarr:latest
    container_name: lunarr
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - lunarr-data:/data
      - /mnt/media:/media:ro
    environment:
      - AUTH_SECRET=your-secret-here
      - ORIGIN=http://localhost:3000

volumes:
  lunarr-data: